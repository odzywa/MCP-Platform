---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-operator-env
  namespace: __NAMESPACE__
data:
  MCP_PLATFORM_DB: /data/mcp_platform.db
  MCP_PLATFORM_CONFIG_ROOT: /data/configs
  MCP_PLATFORM_CALLBACK_URL: http://mcp-platform:8080
  MCP_DEPLOYMENT_DRIVER: kubernetes
  MCP_RUNTIME_NAMESPACE: __NAMESPACE__
  MCP_RUNTIME_IMAGE_REGISTRY_PREFIX: __PULL_REGISTRY__
  # URL bazy dla runtime endpointów — używany przez control-plane do wyświetlania linku
  # Format: https://mcp-runtime-<id>.__NAMESPACE__.__APPS_DOMAIN__/mcp
  MCP_RUNTIME_PUBLIC_BASE_URL: https://mcp-platform.__APPS_DOMAIN__
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-platform-operator
  namespace: __NAMESPACE__
  labels:
    app: mcp-platform-operator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mcp-platform-operator
  template:
    metadata:
      labels:
        app: mcp-platform-operator
    spec:
      serviceAccountName: mcp-operator
      securityContext:
        runAsNonRoot: true
      # Operator i control-plane muszą być na tym samym nodzie bo dzielą RWO PVC
      affinity:
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: mcp-platform
              topologyKey: kubernetes.io/hostname
      containers:
        - name: operator
          image: __PULL_REGISTRY__/mcp-platform-operator-k8s:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: mcp-platform-env
            - configMapRef:
                name: mcp-operator-env
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mcp-platform-data
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
